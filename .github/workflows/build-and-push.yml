name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'novnc-desktop/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/u2giants/novnc-desktop

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck novnc-desktop/novnc-startup.sh
      - name: Lint Python
        run: |
          pip install ruff
          ruff check novnc-desktop/cdp_proxy.py

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: novnc-desktop
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Trigger Coolify redeploy (novnc)
        run: |
          curl -fsSL -X GET \
            "${{ secrets.COOLIFY_BASE_URL }}/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}"
